name: Provision EKS Cluster

on:
  push:
    branches: [main]
    paths:
      - 'k8s/cluster.yaml'   # only runs when cluster.yaml changes
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Create or Update EKS Cluster
        run: |
          if eksctl get cluster --name springboot-cluster --region eu-central-1 2>/dev/null; then
            echo "Cluster exists, skipping creation"
          else
            eksctl create cluster -f k8s/cluster.yaml
          fi
